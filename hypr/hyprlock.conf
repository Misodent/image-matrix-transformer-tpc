background {
  monitor = eDP-1
  path = $HOME/.config/hypr/wallpapers/bg_wallpaper.png
  blur_passes = 1
  blur_size = 7
}

input-field {
  monitor = eDP-1
  size = 20%, 5%
  font_family = JetBrains Mono Nerd Font
  dots_size = 0.08
}

label {
  monitor = eDP-1
  text = $TIME
  font_family = JetBrains Mono Nerd Font
  font_size = 100
  position = 0, -160
}
